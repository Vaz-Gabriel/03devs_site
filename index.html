<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Futuristic Company</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Fonte -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

  <!-- Partículas -->
  <script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- LOADER -->
  <div id="loader">
    <div class="spinner"></div>
  </div>

  <!-- CURSOR -->
  <div class="cursor"></div>

  <!-- PARTICLES -->
  <div id="particles-js"></div>

  <!-- SOM DE HOVER REMOVIDO -->

  <!-- HEADER -->
  <header>
    <h1 class="logo">
      <div class="logo-container">
        <img src="logo.png" class="logo-img">
        <div class="logo-glow"></div>
        <div class="logo-scan"></div>
      </div>
    </h1>

    <nav>
      <a href="#home">Home</a>
      <a href="#projects">Projetos</a>
      <a href="#contact">Contato</a>
    </nav>
  </header>

  <!-- HERO -->
  <section id="home" class="hero">
    <h2 class="glitch">INOVAÇÃO DIGITAL</h2>
    <p class="fade-in">Tecnologia, IA e experiência futurista</p>
  </section>

  <!-- PROJETOS -->
  <section id="projects" class="projects reveal">
    <div class="card hologram">
      <h3>IA Platform</h3>
      <p>Soluções inteligentes</p>
    </div>

    <div class="card hologram">
      <h3>UX Futurista</h3>
      <p>Experiência imersiva</p>
    </div>

    <div class="card hologram">
      <h3>Cloud System</h3>
      <p>Infraestrutura moderna</p>
    </div>
  </section>

  <!-- CONTATO -->
  <section id="contact" class="contact reveal">
    <h2 class="neon">Contato</h2>
    <button class="btn-neon">Falar com especialista</button>
  </section>

  <!-- HOLOGRAMA -->
  <div id="holo-widget">
    <div id="holo-bubble">
      <div class="holo-bubble-label">▶ ASSISTENTE HOLO</div>
      <div id="holo-msg-text"><span class="holo-cursor"></span></div>
    </div>
    <div id="holo-scene">
      <div class="holo-ring holo-ring-1"></div>
      <div class="holo-ring holo-ring-2"></div>
      <div class="holo-ring holo-ring-3"></div>
      <div class="holo-beam"></div>
      <div id="holo-figure">
        <div class="holo-glitch-line"></div>
        <div class="holo-glitch-line"></div>
        <svg viewBox="0 0 70 100" xmlns="http://www.w3.org/2000/svg" fill="none" width="70" height="100">
          <circle cx="35" cy="18" r="11" stroke="#00ffff" stroke-width="1.2" fill="rgba(0,255,255,0.05)"/>
          <path d="M22 38 Q35 32 48 38 L52 72 Q35 68 18 72 Z" stroke="#00ffff" stroke-width="1" fill="rgba(0,255,255,0.04)"/>
          <path d="M22 40 Q12 50 14 60" stroke="rgba(0,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
          <path d="M48 40 Q58 50 56 60" stroke="rgba(0,255,255,0.6)" stroke-width="1" stroke-linecap="round"/>
          <path d="M26 70 L22 90" stroke="#00ffff" stroke-width="1" stroke-linecap="round"/>
          <path d="M44 70 L48 90" stroke="#00ffff" stroke-width="1" stroke-linecap="round"/>
          <path d="M28 48 L35 44 L42 48" stroke="rgba(0,255,255,0.3)" stroke-width="0.8"/>
          <circle cx="35" cy="52" r="3" stroke="#00ffff" stroke-width="0.8" fill="rgba(0,255,255,0.15)"/>
        </svg>
      </div>
      <div id="holo-particles"></div>
      <div class="holo-platform"></div>
      <div class="holo-scanlines"></div>
      <div class="holo-status">HOLO-PROJ v2.4 ◆ ATIVO</div>
    </div>
    <div class="holo-corners">
      <span class="hc tl"></span><span class="hc tr"></span>
      <span class="hc bl"></span><span class="hc br"></span>
    </div>
    <button id="holo-toggle" title="Minimizar">−</button>
    <button id="holo-start-btn">INICIAR INTERAÇÃO</button>
  </div>

  <!-- 🔊 NOVO: ÁUDIO DO MP3 -->
  <audio id="holo-audio" src="Holograma.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
